services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: video-downloader-backend
    ports:
      - "8100:8000"
    volumes:
      - ./downloads:/downloads
      - ./backend/downloads.db:/app/downloads.db
    environment:
      - DOWNLOAD_PATH=/downloads
      - DATABASE_URL=sqlite:///./downloads.db
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=false
    restart: unless-stopped
    networks:
      - video-downloader-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_WS_BASE_URL: ws://localhost:8181/api
    container_name: video-downloader-frontend
    ports:
      - "8181:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - video-downloader-network

networks:
  video-downloader-network:
    driver: bridge

volumes:
  downloads:
    driver: local
